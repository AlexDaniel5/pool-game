<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Setup</title>
    <link rel="stylesheet" href="gameSetupStyle.css">
</head>
<body>
    <form action="/pool_table.html" method="post" onsubmit="return validateForm()">
        <h1>&#127921; Jank Pool</h1>
        <p class="subtitle">Rack 'em up</p>
        <label for="p1_name">Player 1 Name</label>
        <input id="p1_name" type="text" name="p1_name" maxlength="20" placeholder="Player 1" autocomplete="off">
        <label for="p2_name">Player 2 Name</label>
        <input id="p2_name" type="text" name="p2_name" maxlength="20" placeholder="Player 2" autocomplete="off">
        <label for="game_name">Game Name</label>
        <input id="game_name" type="text" name="game_name" maxlength="20" placeholder="Jank Pool Game" autocomplete="off">
        <button type="submit" class="startButton">Start Game</button>
        <a class="secondaryLink" href="load_game.html">&#8635; Saved games</a>
    </form>
    <!-- A bit of javascript for setting default values -->
    <script>
        function setDefaultNames() {
            var p1Input = document.getElementById('p1_name');
            var p2Input = document.getElementById('p2_name');
            var gameInput = document.getElementById('game_name')
            if (p1Input.value.trim() === '') {
                p1Input.value = 'Player 1';
            }
            if (p2Input.value.trim() === '') {
                p2Input.value = 'Player 2';
            }
            if (gameInput.value.trim() === '') {
                gameInput.value = 'Jank Pool Game';
            }
        }

        function validateForm() {
            var p1Input = document.getElementById('p1_name');
            var p2Input = document.getElementById('p2_name');
            if (p1Input.value.trim() === '') {
                setDefaultNames();
                return true;
            }
            if (p1Input.value.trim() === p2Input.value.trim()) {
                alert('Player 1 and Player 2 names cannot be equal.');
                return false; // Prevent form submission
            }
            // If names are not equal, set default names and allow form submission
            setDefaultNames();
            return true;
        }
    </script>
</body>
</html>
