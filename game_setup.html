<html>
    <head>
        <title>Game Setup</title>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            form {
                display: flex;
                flex-direction: column;
                align-items: center;
                max-width: 400px;
                width: 100%;
                padding: 20px;
                background-color: #d6d6d6;
                border-radius: 5px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            h1, label, input, h3 {
                margin: 10px 0;
            }
        </style>
    </head>
    <body>
        <form action="/pool_table.html" method="post" onsubmit="setDefaultNames()">
            <h1>Jank Pool</h1>
            <label for="p1_name">Player 1 Name:</label>
            <input id="p1_name" type="text" name="p1_name" size="15">
            <label for="p2_name">Player 2 Name:</label>
            <input id="p2_name" type="text" name="p2_name" size="15">
            <label for="game_name">Game Name:</label>
            <input id="game_name" type="text" name="game_name" size="15">
            <h3><input type="submit" value="Start Game"></h3>
            <h2>Load Game</h2>
            <label for="game_name">Game ID:</label>
            <input id="game_id" type="text" name="game_id" size="15">
            <h3><input type="submit" value="Load Game"></h3>
        </form>
        <script>
            function setDefaultNames() {
                var p1Input = document.getElementById('p1_name');
                var p2Input = document.getElementById('p2_name');
                var gameInput = document.getElementById('game_name')
                var gameId = document.getElementById('game_id')
                if (game_id.value === '') {
                    if (p1Input.value.trim() === '') {
                        p1Input.value = 'Player 1';
                    }
                    if (p2Input.value.trim() === '') {
                        p2Input.value = 'Player 2';
                    }
                    if (gameInput.value.trim() === '') {
                        gameInput.value = 'Game 1';
                    }
                }
            }
        </script>
    </body>
</html>
