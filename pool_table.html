<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Table Simulation</title>
    <!-- CSS -->
    <link rel="stylesheet" href="poolTableStyle.css">
</head>
<body>
  <!-- Game Info -->
  <div id="gameInfo">
    <div class="gameTitle"><span id="gameName"></span></div>
    <button class="backButton" onclick="goBack()">&#8617; New Game</button>
  </div>
  <div id="container">
    <!-- Scoreboard -->
    <div id="playerNamesContainer">
      <div class="playerCard" id="p1Card">
        <span class="playerName"><span id="p1Name"></span></span>
        <span class="playerSide" id="player1Side"></span>
      </div>
      <p id="currentTurn">Turn: <span id="currentP"></span></p>
      <div class="playerCard" id="p2Card">
        <span class="playerName"><span id="p2Name"></span></span>
        <span class="playerSide" id="player2Side"></span>
      </div>
    </div>
    <!-- SVG File. The viewBox must match the footprint of the inner SVG that
         Physics.py generates (width="700" height="1375") so the table exactly
         fills this element; sizing and rotation happen in CSS. -->
    <div id="tableWrap">
      <svg id="poolTable" viewBox="0 0 700 1375" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="game_id" data_id="0"></div>
    <div id="current_turn" data_cp="0"></div>
  </div>
  <!-- jQuery Library -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
  <!-- JavaScript -->
  <script src="poolActions.js"></script>
</body>
</html>
