<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Table Simulation</title>
    <!-- CSS -->
    <link rel="stylesheet" href="poolTableStyle.css">
</head>
<body>
  <div id="gameInfo">
    <strong><span id="gameName"></span></strong><br>
    <span id="p1Name"></span>: <span id="player1Side"></span><br>
    <span id="p2Name"></span>: <span id="player2Side"></span><br>
  </div>
  <div id="container">
    <!-- Player header -->
    <div id="playerNamesContainer">
      <h2><span id="p1Name"></span> vs <span id="p2Name"></span></h2>
      <p id="currentTurn">Current Turn: <span id="currentP"></span></p>
    </div>    
    <!-- SVG File -->
    <svg id="poolTable" width="1000" height="500" viewBox="0 0 1400 2750" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="game_id" data_id="0"></div>
    <div id="current_turn" data_cp="0"></div>
  </div>
  <!-- jQuery library -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
  <!-- JavaScript -->
  <script src="poolActions.js"></script>
</body>
</html>
